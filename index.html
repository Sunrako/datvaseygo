<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cards &amp; Names</title>
  <style>
    * { box-sizing: border-box; margin: 0px; padding: 0px; }
    body { font-family: sans-serif; background: #3087de; display: flex; flex-direction: column; align-items: center; padding: 32px; min-height: 800px; }
    h1 { margin-bottom: 16px; color: #8aafee; font-size: 32px; }
    .search-container { margin-bottom: 24px; width: 100%; max-width: 400px; }
    .search-input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 2px solid #124992; font-size: 16px; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: #3182ce; }
    .cards { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; width: 100%; }
    .card { background: white; border-radius: 12px; box-shadow: 0px 4px 12px rgba(0,0,0,0.1); padding: 24px 32px; min-width: 160px; max-width: 280px; text-align: center; position: relative; transition: transform 0.2s; }
    .card:hover { transform: translateY(-2px); }
    .card h2 { color: #6bce31; margin-bottom: 8px; font-size: 20px; }
    .card p { color: #718096; font-size: 14px; }
    .delete-btn { position: absolute; top: 8px; right: 8px; background: #e53e3e; color: white; border: none; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 10px; }
    .no-cards { font-size: 16px; color: #718096; }
    .add-form { margin-bottom: 24px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 600px; }
    .add-form input { flex: 1; min-width: 140px; padding: 10px 14px; border-radius: 8px; border: 2px solid #124992; font-size: 15px; outline: none; }
    .add-form button { padding: 10px 20px; border-radius: 8px; border: none; background: #6bce31; color: white; font-size: 15px; cursor: pointer; }
    .add-form button:hover { background: #58b025; }
  </style>
</head>
<body>
  <h1>Cards, Names &amp; Things</h1>
  <div class="add-form">
    <input type="text" id="nameInput" placeholder="Name" />
    <input type="text" id="thingInput" placeholder="Thing" />
    <button onclick="addCard()">Add Card</button>
  </div>
  <div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="Search cards..." />
  </div>
  <div class="cards" id="cardContainer">
    <p class="no-cards">Loading...</p>
  </div>
  <script>
    let allCards = [];

    async function fetchCards() {
      try {
        const res = await fetch('/api/cards');
        allCards = await res.json();
        renderCards(allCards);
      } catch (err) {
        document.getElementById('cardContainer').innerHTML = '<p class="no-cards">Error loading cards.</p>';
      }
    }

    function renderCards(cardsToDisplay) {
      const container = document.getElementById('cardContainer');
      if (!cardsToDisplay.length) {
        container.innerHTML = '<p class="no-cards">No matching cards found.</p>';
        return;
      }
      container.innerHTML = cardsToDisplay.map(card => `
        <div class="card">
          <button class="delete-btn" onclick="deleteCard(${card.id})">X</button>
          <h2>${card.name}</h2>
          <p>${card.thing}</p>
        </div>
      `).join('');
    }

    async function addCard() {
      const name = document.getElementById('nameInput').value.trim();
      const thing = document.getElementById('thingInput').value.trim();
      if (!name || !thing) return alert('Please fill in both fields.');
      await fetch('/api/cards', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, thing })
      });
      document.getElementById('nameInput').value = '';
      document.getElementById('thingInput').value = '';
      fetchCards();
    }

    async function deleteCard(id) {
      if (!confirm('Delete this card?')) return;
      await fetch(`/api/cards/${id}`, { method: 'DELETE' });
      fetchCards();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const filtered = allCards.filter(card =>
        card.name.toLowerCase().includes(query) ||
        card.thing.toLowerCase().includes(query)
      );
      renderCards(filtered);
    });

    fetchCards();
  </script>
</body>
</html>
